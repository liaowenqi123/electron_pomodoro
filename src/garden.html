<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜园子</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/garden.css">
</head>
<body>
  <div class="garden-frame">
    <!-- 顶部栏 -->
    <div class="garden-header">
      <div class="garden-draggable"></div>
      <div class="garden-info">
        <span class="garden-title">🌱 我的菜园</span>
        <div class="garden-coins">
          <span class="coin-icon">💰</span>
          <span id="coinCount">0</span>
        </div>
        <button class="garden-signin-btn" id="signinBtn" title="签到">📅</button>
        <button class="garden-shop-btn" id="shopBtn" title="商店">🏪</button>
      </div>
      <button class="garden-btn-close" id="gardenCloseBtn">×</button>
    </div>
    
    <!-- 菜园网格 -->
    <div class="garden-content">
      <div class="garden-grid" id="gardenGrid">
        <!-- 格子由 JS 动态生成 -->
      </div>
    </div>
    
    <!-- 种子背包 -->
    <div class="garden-seed-bag">
      <h3>🎒 种子背包</h3>
      <div class="seed-list" id="seedList">
        <!-- 种子由 JS 动态生成 -->
      </div>
    </div>
    
    <!-- 作物背包 -->
    <div class="garden-crop-bag">
      <h3>🧺 作物背包</h3>
      <div class="crop-list" id="cropList">
        <!-- 作物由 JS 动态生成 -->
      </div>
    </div>
    
    <!-- 提示信息 -->
    <div class="garden-tip" id="gardenTip">
      点击种子，然后点击空格子种植
    </div>
  </div>

  <!-- 商店弹窗 -->
  <div class="shop-modal" id="shopModal">
    <div class="shop-content">
      <div class="shop-header">
        <span class="shop-title">🏪 商店</span>
        <button class="shop-close" id="shopCloseBtn">×</button>
      </div>
      
      <!-- 标签页切换 -->
      <div class="shop-tabs">
        <button class="shop-tab active" data-tab="buy">🌱 购买种子</button>
        <button class="shop-tab" data-tab="sell">🧺 出售作物</button>
      </div>
      
      <!-- 购买种子区域 -->
      <div class="shop-panel active" id="buyPanel">
        <div class="shop-grid" id="shopBuyGrid">
          <!-- 种子由 JS 动态生成 -->
        </div>
      </div>
      
      <!-- 出售作物区域 -->
      <div class="shop-panel" id="sellPanel">
        <div class="shop-grid" id="shopSellGrid">
          <!-- 作物由 JS 动态生成 -->
        </div>
        <button class="shop-sell-all" id="sellAllBtn">💰 一键出售全部</button>
      </div>
    </div>
  </div>

  <!-- 签到弹窗 -->
  <div class="signin-modal" id="signinModal">
    <div class="signin-content">
      <div class="signin-header">
        <span class="signin-title">📅 每日签到</span>
        <button class="signin-close" id="signinCloseBtn">×</button>
      </div>
      
      <!-- 签到统计 -->
      <div class="signin-stats">
        <div class="signin-stat">
          <span class="signin-stat-value" id="signinContinuous">0</span>
          <span class="signin-stat-label">连续签到</span>
        </div>
        <div class="signin-stat-divider">|</div>
        <div class="signin-stat">
          <span class="signin-stat-value" id="signinTotal">0</span>
          <span class="signin-stat-label">累计签到</span>
        </div>
      </div>
      
      <!-- 本周签到日历 -->
      <div class="signin-calendar">
        <div class="signin-calendar-row">
          <span class="signin-day-label">一</span>
          <span class="signin-day-label">二</span>
          <span class="signin-day-label">三</span>
          <span class="signin-day-label">四</span>
          <span class="signin-day-label">五</span>
          <span class="signin-day-label">六</span>
          <span class="signin-day-label">日</span>
        </div>
        <div class="signin-calendar-row" id="signinWeekDots">
          <span class="signin-dot" data-day="1"></span>
          <span class="signin-dot" data-day="2"></span>
          <span class="signin-dot" data-day="3"></span>
          <span class="signin-dot" data-day="4"></span>
          <span class="signin-dot" data-day="5"></span>
          <span class="signin-dot" data-day="6"></span>
          <span class="signin-dot" data-day="0"></span>
        </div>
      </div>
      
      <!-- 今日奖励 -->
      <div class="signin-rewards">
        <div class="signin-rewards-title">━━━ 今日奖励 ━━━</div>
        <div class="signin-rewards-list" id="signinRewardsList">
          <!-- 奖励由 JS 动态生成 -->
        </div>
      </div>
      
      <!-- 签到按钮 -->
      <button class="signin-btn" id="signinConfirmBtn">✅ 立即签到</button>
    </div>
  </div>

  <!-- 引入依赖 -->
  <script src="scripts/modules/utils.js"></script>
  <script src="scripts/modules/garden.js"></script>
</body>
</html>
