<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase 用户测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 35px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 8px;
      font-size: 22px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
      font-size: 13px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-weight: 500;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    input::placeholder {
      color: #aaa;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 15px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status-bar {
      margin-top: 15px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }

    .status-bar .connected {
      color: #28a745;
    }

    .status-bar .disconnected {
      color: #dc3545;
    }

    .tabs {
      display: flex;
      margin-bottom: 20px;
      background: #f0f0f0;
      border-radius: 10px;
      padding: 3px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      color: #666;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .tab.active {
      background: white;
      color: #667eea;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
    }

    .user-info {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 15px;
      text-align: center;
    }

    .user-info h2 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .user-info p {
      font-size: 12px;
      opacity: 0.9;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin-top: 15px;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .api-key-panel {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .api-key-panel h3 {
      color: #4ade80;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .api-key-panel .api-key {
      background: #16213e;
      padding: 10px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      color: #f0f0f0;
      word-break: break-all;
      border: 1px solid #4ade80;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Supabase 测试</h1>
    <p class="subtitle">用户名注册与登录</p>

    <!-- 已登录状态 -->
    <div id="loggedInPanel" class="hidden">
      <div class="user-info">
        <h2 id="welcomeText">欢迎!</h2>
        <p id="userMetaText"></p>
        <button class="btn logout-btn" id="logoutBtn">退出登录</button>
      </div>
      
      <!-- API Key 面板（仅 Admin 可见） -->
      <div id="apiKeyPanel" class="api-key-panel" style="display: none;">
        <h3>🔑 DeepSeek API Key</h3>
        <div class="api-key" id="apiKeyText"></div>
      </div>
    </div>

    <!-- 未登录状态 -->
    <div id="authPanel">
      <div class="tabs">
        <div class="tab active" data-tab="login">登录</div>
        <div class="tab" data-tab="register">注册</div>
      </div>

      <!-- 登录表单 -->
      <div class="form-panel active" id="loginPanel">
        <form id="loginForm">
          <div class="form-group">
            <label for="loginUsername">用户名</label>
            <input type="text" id="loginUsername" placeholder="请输入用户名" required>
          </div>

          <div class="form-group">
            <label for="loginPassword">密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码" required>
          </div>

          <button type="submit" class="btn" id="loginBtn">登录</button>
        </form>
      </div>

      <!-- 注册表单 -->
      <div class="form-panel" id="registerPanel">
        <form id="registerForm">
          <div class="form-group">
            <label for="registerUsername">用户名</label>
            <input type="text" id="registerUsername" placeholder="请输入用户名（至少2个字符）" required minlength="2">
          </div>

          <div class="form-group">
            <label for="registerPassword">密码</label>
            <input type="password" id="registerPassword" placeholder="请输入密码（至少6位）" required minlength="6">
          </div>

          <button type="submit" class="btn" id="registerBtn">注册</button>
        </form>
      </div>

      <div id="authMessage" class="message"></div>
    </div>

    <div class="status-bar">
      <span id="connectionStatus" class="disconnected">● 检测连接中...</span>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
